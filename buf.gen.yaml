# Run: task generate
# (installs protoc-gen-slimrpc-go via cargo if not already present)

version: v2

inputs:
  - git_repo: https://github.com/a2aproject/A2A.git
    # Keep in sync with github.com/a2aproject/a2a-go buf.gen.yaml
    ref: 7df7685561b19c841c5a1349653df347db8d3314
    subdir: specification

managed:
  enabled: true
  override:
    # Redirect the generated Go package to our module so that:
    #   - the standard pb plugin emits message types into a2apb/
    #   - the slimrpc plugin emits service stubs into the same package
    # Both outputs share the same package and are wire-compatible with
    # github.com/a2aproject/a2a-go/a2apb (generated from the same proto source).
    - file_option: go_package
      path: a2a.proto
      value: github.com/agntcy/slim-a2a-go/a2apb

plugins:
  # slimrpc service stubs (client interface, server interface, handler
  # registration). Requires protoc-gen-slimrpc-go in PATH.
  - local: protoc-gen-slimrpc-go
    out: a2apb/v1
    opt:
      - paths=source_relative
      - types_import=github.com/a2aproject/a2a-go/v2/a2apb/v1
      - types_alias=a2a_a2apb
